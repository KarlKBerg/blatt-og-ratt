    <header>
      <a href="../index.html" class="header-logo"
        >BLÅTT <span class="logo-mid">&</span> RÅTT</a

      <div class="nav-container">
        <button class="hamburger-menu" aria-label="Åpne meny">
          <i class="fa-solid fa-bars"></i>
        </button>
        <nav id="main-navigation">
          <a href="../index.html">HJEM</a>
          <a href="musikk.html">MUSIKK</a>

    <main>
      <section class="shop">
        <h1 class="section-heading">BUTIKK</h1>

        <div class="search-container">
          <search>
            <input
              type="search"
              id="search-input"
              placeholder="Søk her"
              autocomplete="off"
            />
          </search>
        </div>

        <div class="all-products">
          <h2 class="section-heading">Alle produkter</h2>

          <div class="all-products-container">
            <div class="categories">
              <h3>Kategorier</h3>
              <button data-cat="all" class="active cat-btn">Alle</button>
              <button data-cat="vinyl" class="cat-btn">Vinyl</button>
              <button data-cat="cd" class="cat-btn">CD-Plater</button>
              <button data-cat="t-shirts" class="cat-btn">T-Skjorter</button>
              <button data-cat="misc" class="cat-btn">Misc</button>
            </div>
            <div class="products-container">
              <h3>Produkter</h3>
              <div class="products"></div>
